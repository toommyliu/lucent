packages:
  - "packages/*"
  - app
  - docs

onlyBuiltDependencies:
  - electron # https://github.com/electron/electron/issues/44008
  - esbuild
  - sharp

ignoredBuiltDependencies:
  - core-js
  - unrs-resolver

allowBuilds:
  core-js: true
  electron-winstaller: false
  esbuild: true
  msgpackr-extract: false
  sharp: true

minimumReleaseAgeExclude:
  - "@effect/tsgo"

overrides:
  "effect": "4.0.0-beta.83"
  "@effect/platform": "4.0.0-beta.83"
  "@effect/platform-node": "4.0.0-beta.83"
  "@effect/platform-node-shared": "4.0.0-beta.83"
  "fast-uri": "^3.1.2"
  "tmp": "^0.2.6"
  "typescript": "^5.9.3"
  "vitest": "^3.2.6"
